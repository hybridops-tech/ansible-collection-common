# purpose: CI for HybridOps Ansible collection (lint + build sanity).
# adr: ADR-0606-ansible-collections-release-process
# maintainer: HybridOps.Tech

name: hybridops.common CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: collection-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install pre-commit ansible-lint

      - name: Prepare collection runtime
        shell: bash
        run: |
          COLLECTIONS_ROOT="${PWD}/.ansible/collections"
          COLLECTIONS_TAIL="${HOME}/.ansible/collections:/usr/share/ansible/collections"

          mkdir -p "${COLLECTIONS_ROOT}/ansible_collections/hybridops"
          ln -sfn "${PWD}" "${COLLECTIONS_ROOT}/ansible_collections/hybridops/common"

          if python - <<'PY'
          import pathlib
          import yaml
          data = yaml.safe_load(pathlib.Path("requirements.yml").read_text()) or {}
          raise SystemExit(0 if data.get("collections") else 1)
          PY
          then
            env -u ANSIBLE_COLLECTIONS_PATHS \
              ANSIBLE_COLLECTIONS_PATH="${COLLECTIONS_ROOT}:${COLLECTIONS_TAIL}" \
              ansible-galaxy collection install -r requirements.yml -p "${COLLECTIONS_ROOT}" --force
          fi

          {
            echo "ANSIBLE_COLLECTIONS_PATH=${COLLECTIONS_ROOT}:${COLLECTIONS_TAIL}"
          } >> "${GITHUB_ENV}"

      - name: Run pre-commit
        shell: bash
        run: |
          resolve_base_sha() {
            local event_name="${1}"
            local ref_type="${2}"
            local before_sha="${3}"
            local pr_base_sha="${4}"

            if [ "${event_name}" = "pull_request" ]; then
              printf '%s\n' "${pr_base_sha}"
              return
            fi

            if [ "${ref_type}" = "tag" ] && git rev-parse HEAD^ >/dev/null 2>&1; then
              git rev-parse HEAD^
              return
            fi

            if [ -n "${before_sha}" ] && ! printf '%s' "${before_sha}" | grep -Eq '^0+$'; then
              printf '%s\n' "${before_sha}"
              return
            fi

            git rev-list --max-parents=0 HEAD | tail -n1
          }

          BASE_SHA="$(
            resolve_base_sha \
              "${GITHUB_EVENT_NAME}" \
              "${{ github.ref_type }}" \
              "${{ github.event.before }}" \
              "${{ github.event.pull_request.base.sha }}"
          )"
          pre-commit run --from-ref "${BASE_SHA}" --to-ref HEAD

      - name: Run ansible-lint on changed Ansible files
        shell: bash
        run: |
          resolve_base_sha() {
            local event_name="${1}"
            local ref_type="${2}"
            local before_sha="${3}"
            local pr_base_sha="${4}"

            if [ "${event_name}" = "pull_request" ]; then
              printf '%s\n' "${pr_base_sha}"
              return
            fi

            if [ "${ref_type}" = "tag" ] && git rev-parse HEAD^ >/dev/null 2>&1; then
              git rev-parse HEAD^
              return
            fi

            if [ -n "${before_sha}" ] && ! printf '%s' "${before_sha}" | grep -Eq '^0+$'; then
              printf '%s\n' "${before_sha}"
              return
            fi

            git rev-list --max-parents=0 HEAD | tail -n1
          }

          BASE_SHA="$(
            resolve_base_sha \
              "${GITHUB_EVENT_NAME}" \
              "${{ github.ref_type }}" \
              "${{ github.event.before }}" \
              "${{ github.event.pull_request.base.sha }}"
          )"
          mapfile -t LINT_TARGETS < <(
            git diff --name-only --diff-filter=ACMR "${BASE_SHA}" HEAD -- \
              galaxy.yml \
              requirements.yml \
              ':(glob)roles/**/*.yml' \
              ':(glob)roles/**/*.yaml' \
            | sort -u
          )
          if [ "${#LINT_TARGETS[@]}" -eq 0 ]; then
            echo "No changed Ansible files to lint."
            exit 0
          fi
          printf 'ansible-lint targets:\n'
          printf '  %s\n' "${LINT_TARGETS[@]}"
          ansible-lint -c .config/linters/ansible-lint.yml "${LINT_TARGETS[@]}"

      - name: Build collection (sanity)
        run: |
          ansible-galaxy collection build --force
