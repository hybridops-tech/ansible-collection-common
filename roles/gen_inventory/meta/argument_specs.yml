---
# SPDX-License-Identifier: MIT-0
# purpose: Argument specification for dynamic inventory generation role
# maintainer: HybridOps.Tech

argument_specs:
  main:
    short_description: "Generate environment-specific Ansible inventory"
    options:
      env:
        type: str
        required: true
        description: "Environment key (e.g., dev, staging, prod)."

      project_root:
        type: str
        required: false

      inventories_dir_name:
        type: str
        required: false

      ip_data_filename:
        type: str
        required: false

      placeholder_ip:
        type: str
        required: false

      test_output_dir:
        type: str
        required: false
