---
# SPDX-License-Identifier: MIT-0
# purpose: Validate connectivity_test artifacts and copy into tests/output for evidence
# adr: ADR-0600-environment-guard-framework
# maintainer: HybridOps.Studio

- name: Validate connectivity artifacts
  hosts: localhost
  connection: local
  gather_facts: true
  vars:
    _project_root: >-
      {{ playbook_dir
         | regex_replace('/deployment/ci/playbooks.*$', '')
         | regex_replace('/common/playbooks.*$', '')
         | regex_replace('/roles/.*$', '') }}
    central_root: >-
      {{
        vars.get(
          'connectivity_logs_root',
          connectivity.paths.connectivity_logs_dir
          | default(_project_root ~ '/output/logs/ansible/connectivity_logs')
        )
      }}
    run_dir: "{{ vars.get('connectivity_run_dir', central_root ~ '/latest') }}"
    json_name: "{{ connectivity.audit.json_file | default('connectivity_report.json') }}"
    jsonl_name: "{{ connectivity.audit.jsonl_file | default('connectivity_report.jsonl') }}"
    copy_to_output: true
  tasks:
  - name: Stat run_dir (follow symlink if latest)
    ansible.builtin.stat:
      path: "{{ run_dir }}"
      follow: true
    register: run_dir_stat
    changed_when: false

  - name: Discover newest run folder as fallback
    ansible.builtin.find:
      paths: "{{ central_root }}"
      file_type: directory
      recurse: false
    register: run_dirs
    when: not run_dir_stat.stat.exists

  - name: Choose newest run folder
    ansible.builtin.set_fact:
      run_dir: "{{ (run_dirs.files | sort(attribute='mtime', reverse=True) | first).path }}"
    when:
    - not run_dir_stat.stat.exists
    - run_dirs.matched | int > 0

  - name: Re-stat run_dir after fallback
    ansible.builtin.stat:
      path: "{{ run_dir }}"
      follow: true
    register: run_dir_stat2
    changed_when: false
    when: not run_dir_stat.stat.exists

  - name: Fail if no connectivity run directory is available
    ansible.builtin.fail:
      msg: >-
        No connectivity run directory found under {{ central_root }} (checked: {{ run_dir }})
    when:
    - not run_dir_stat.stat.exists
    - run_dir_stat2 is not defined or not run_dir_stat2.stat.exists

  - name: Check JSON report
    ansible.builtin.stat:
      path: "{{ run_dir }}/{{ json_name }}"
    register: json_stat
    changed_when: false

  - name: Check JSONL report (optional)
    ansible.builtin.stat:
      path: "{{ run_dir }}/{{ jsonl_name }}"
    register: jsonl_stat
    changed_when: false

  - name: Connectivity artifact summary
    ansible.builtin.debug:
      msg: |
        CONNECTIVITY TEST VALIDATION
        RUN DIR : {{ run_dir }}
        JSON    : {{ json_stat.stat.exists | ternary('OK', 'MISSING') }}
        JSONL   : {{ jsonl_stat.stat.exists | ternary('OK', 'MISSING') }}
    failed_when: not json_stat.stat.exists

  - name: Ensure tests/output/<run_id> exists
    ansible.builtin.file:
      path: "{{ playbook_dir }}/output/{{ run_dir | basename }}"
      state: directory
      mode: "0755"
    when: copy_to_output

  - name: Copy artifacts to tests/output/<run_id>
    ansible.builtin.copy:
      src: "{{ item }}"
      dest: "{{ playbook_dir }}/output/{{ run_dir | basename }}/{{ item | basename }}"
      remote_src: true
      mode: "0644"
    loop:
    - "{{ run_dir }}/{{ json_name }}"
    - "{{ run_dir }}/{{ jsonl_name }}"
    when: copy_to_output
    ignore_errors: true
