---
# SPDX-License-Identifier: MIT-0
# purpose: Orchestrate host selection; assumes env_guard has validated the environment.
# adr: ADR-0600-environment-guard-framework
# maintainer: HybridOps.Studio

- name: Ensure correlation ID for logging
  when: host_selector_use_cid | default(false) | bool
  block:
    - name: Seed CID from defaults
      ansible.builtin.set_fact:
        cid: "{{ host_selector_cid_pre | default('', true) }}"

    - name: Generate CID if missing
      when: (cid | default('') | length) == 0
      block:
        - name: Generate CID material
          ansible.builtin.set_fact:
            _cid32: "{{ lookup('password', '/dev/null length=32 chars=hexdigits') | lower }}"

        - name: Format CID as UUID-like string
          ansible.builtin.set_fact:
            cid: >-
              {{
                _cid32[0:8] ~ '-' ~ _cid32[8:12] ~ '-' ~ _cid32[12:16] ~ '-' ~
                _cid32[16:20] ~ '-' ~ _cid32[20:32]
              }}

    - name: Start banner
      ansible.builtin.debug:
        msg: "[cid={{ cid }}] host_selector flow started"

- name: Validate environment from env_guard
  ansible.builtin.fail:
    msg: "Environment required from env_guard framework. Use env_guard role first."
  when: validated_env is not defined

- name: Handle user input and method selection
  ansible.builtin.include_tasks: input_handling.yml

- name: Execute Method A - Manual entry
  ansible.builtin.include_tasks: method_a_manual.yml
  when: method == "A"

- name: Execute Method B - Group selection
  ansible.builtin.include_tasks: method_b_groups.yml
  when: method == "B"

- name: Execute Method C - Hierarchical browsing
  ansible.builtin.include_tasks: method_c_hierarchical.yml
  when: method == "C"

- name: Execute Method D - All hosts
  ansible.builtin.include_tasks: method_d_all_hosts.yml
  when: method == "D"

- name: Create dynamic groups
  ansible.builtin.include_tasks: dynamic_group_creation.yml
